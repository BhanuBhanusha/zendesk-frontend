<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDesk Support - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ZenDesk Support</h1>
    </header>

    <div class="auth-container">
        <!-- Login Card -->
        <div id="login-card" class="auth-card">
            <h2 class="auth-title">
                <i class="fa-solid fa-right-to-bracket" style="margin-right: 0.75rem;"></i>Sign In
            </h2>
            
            <div id="registered-alert" class="alert-info">
                <i class="fa-solid fa-circle-check" style="margin-right: 0.5rem;"></i> Registration successful! Please log in below.
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <input type="email" id="login-email" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-role">Log in as Role</label>
                    <select id="login-role" class="form-input" required>
                        <option value="CUSTOMER">Customer</option>
                        <option value="SUPPORT_AGENT">Support Agent</option>
                        <option value="SUPERVISOR">Supervisor</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #4b5563;">
                New user to ZenDesk? <a href="index.html" class="link-theme">Create an account</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
